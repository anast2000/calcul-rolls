<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Calculateur Rolls Transport PRO</title>

<style>
body {font-family: Arial; background:#f2f2f2; padding:20px;}
.box {background:white; padding:20px; border-radius:10px; max-width:800px; margin:auto;}
input, select {width:100%; padding:8px; margin-bottom:10px;}
button {padding:10px; margin:5px 0; background:#0078d4; color:white; border:none; cursor:pointer;}
.ref {border:1px solid #ddd; padding:10px; margin-bottom:10px;}
.table {width:100%; margin-top:15px; border-collapse:collapse;}
.table th, .table td {border:1px solid #ddd; padding:8px; text-align:center;}
.result {font-size:20px; font-weight:bold; margin-top:10px;}
#comparatif {margin-top:20px;}
</style>
</head>

<body>

<div class="box">

<h2>📦 Calculateur Rolls Transport (version réelle)</h2>

<select id="type">
<option value="13.6,2.45">🚚 Semi-Remorque (13.6 x 2.45)</option>
<option value="13.58,2.35">📦 45' HC</option>
<option value="12,2.35">📦 40' HC</option>
<option value="12,2.35">📦 40' DV</option>
<option value="5.9,2.35">📦 20' DV</option>
</select>

<div id="refs"></div>

<button onclick="addRef()">➕ Ajouter référence</button>
<button onclick="calcul()">🧮 Calculer</button>
<button onclick="optimiser()">🚀 Optimiser</button>
<button onclick="comparer()">📊 Comparer</button>

<div class="result" id="resultat"></div>

<table class="table" id="detail" style="display:none;">
<thead>
<tr>
<th>Réf</th>
<th>Ø (mm)</th>
<th>Quantité</th>
<th>Bloc</th>
<th>Longueur utilisée</th>
<th>Status</th>
</tr>
</thead>
<tbody></tbody>
</table>

<div id="comparatif"></div>

</div>

<script>

let maxRef = 6;

function addRef(){
    let container = document.getElementById("refs");
    if(container.children.length >= maxRef) return;

    let div = document.createElement("div");
    div.className = "ref";

    div.innerHTML = `
    <h4>Référence ${container.children.length+1}</h4>

    Nom / Code
    <input type="text" class="nomRef">

    Diamètre (mm)
    <input type="number" class="diametre" value="800">

    Largeur roll (mm)
    <input type="number" class="largeurRoll" value="1200">

    Quantité demandée
    <input type="number" class="quantite" placeholder="Ex: 15">
    `;

    container.appendChild(div);
}

function calcul(){

    let type = document.getElementById("type").value.split(",");
    let longueurTotale = parseFloat(type[0]);
    let largeur = parseFloat(type[1]);

    let longueurRestante = longueurTotale;
    let totalGlobal = 0;

    let tbody = document.querySelector("#detail tbody");
    tbody.innerHTML = "";

    document.querySelectorAll(".ref").forEach((ref, index) => {

        let nom = ref.querySelector(".nomRef").value || ("R"+(index+1));
        let d = parseFloat(ref.querySelector(".diametre").value) / 1000;
        let lr = parseFloat(ref.querySelector(".largeurRoll").value) / 1000;
        let quantite = parseInt(ref.querySelector(".quantite").value) || 0;

        if(quantite === 0) return;

        let nbLargeur = Math.floor(largeur / d);

        if(nbLargeur === 0){
            tbody.innerHTML += `
            <tr>
            <td>${nom}</td>
            <td>${d*1000}</td>
            <td>${quantite}</td>
            <td>-</td>
            <td>0 m</td>
            <td>❌ Trop large</td>
            </tr>`;
            return;
        }

        let rollsParBloc;
        let typeBloc;

        // ✅ SEMI → pyramide réelle
        if(longueurTotale == 13.6){
            rollsParBloc = (nbLargeur * (nbLargeur + 1)) / 2;
            typeBloc = "Pyramide réelle";
        }
        else{
            rollsParBloc = (nbLargeur == 2) ? 5 :
                           (nbLargeur >= 3 ? 8 : nbLargeur);

            typeBloc = (nbLargeur == 2) ? "Pyramide (2-1-2)" :
                       (nbLargeur >= 3 ? "Pile (3-2-3)" : "Simple");
        }

        let nbBlocs = Math.ceil(quantite / rollsParBloc);
        let longueurUtilisee = nbBlocs * lr;

        let rentre = longueurUtilisee <= longueurRestante;

        if(rentre){
            longueurRestante -= longueurUtilisee;
            totalGlobal += quantite;
        }

        tbody.innerHTML += `
        <tr>
        <td>${nom}</td>
        <td>${d*1000}</td>
        <td>${quantite}</td>
        <td>${typeBloc}</td>
        <td>${longueurUtilisee.toFixed(2)} m</td>
        <td>${rentre ? "✅ OK" : "❌ Ne rentre pas"}</td>
        </tr>
        `;

    });

    document.getElementById("resultat").innerText =
        "✅ Total chargé = " + totalGlobal + 
        " rolls | Longueur restante = " + longueurRestante.toFixed(2) + " m";

    document.getElementById("detail").style.display = "table";
}


function optimiser(){

    let type = document.getElementById("type").value.split(",");
    let longueurTotale = parseFloat(type[0]);
    let largeur = parseFloat(type[1]);

    let refs = [];

    document.querySelectorAll(".ref").forEach((ref, index) => {

        let nom = ref.querySelector(".nomRef").value || ("R"+(index+1));
        let d = parseFloat(ref.querySelector(".diametre").value) / 1000;
        let lr = parseFloat(ref.querySelector(".largeurRoll").value) / 1000;

        let nbLargeur = Math.floor(largeur / d);
        if(nbLargeur === 0) return;

        let rollsParBloc;

        if(longueurTotale == 13.6){
            rollsParBloc = (nbLargeur * (nbLargeur + 1)) / 2;
        } else {
            rollsParBloc = (nbLargeur == 2) ? 5 :
                           (nbLargeur >= 3 ? 8 : nbLargeur);
        }

        let rendement = rollsParBloc / lr;

        refs.push({nom, d, lr, rollsParBloc, rendement});
    });

    refs.sort((a,b)=>b.rendement - a.rendement);

    let longueurRestante = longueurTotale;
    let totalGlobal = 0;

    let tbody = document.querySelector("#detail tbody");
    tbody.innerHTML = "";

    refs.forEach(ref => {

        let nbBlocs = Math.floor(longueurRestante / ref.lr);
        let total = nbBlocs * ref.rollsParBloc;

        let longueurUtilisee = nbBlocs * ref.lr;

        longueurRestante -= longueurUtilisee;
        totalGlobal += total;

        tbody.innerHTML += `
        <tr>
        <td>${ref.nom}</td>
        <td>${ref.d*1000}</td>
        <td>MAX</td>
        <td>Optimisé</td>
        <td>${longueurUtilisee.toFixed(2)} m</td>
        <td>✅</td>
        </tr>`;
    });

    document.getElementById("resultat").innerText =
        "🚀 Optimisé = " + totalGlobal + " rolls | reste = " + longueurRestante.toFixed(2) + " m";

    document.getElementById("detail").style.display = "table";
}


function comparer(){

    let types = [
        {nom:"🚚 Semi", L:13.6, l:2.45},
        {nom:"📦 40'", L:12, l:2.35},
        {nom:"📦 20'", L:5.9, l:2.35}
    ];

    let html = "<h3>Comparatif transport</h3>";
    let meilleur = "";
    let max = 0;

    types.forEach(t => {

        let longueurRestante = t.L;
        let totalGlobal = 0;

        document.querySelectorAll(".ref").forEach(ref => {

            let d = parseFloat(ref.querySelector(".diametre").value) / 1000;
            let lr = parseFloat(ref.querySelector(".largeurRoll").value) / 1000;

            let nbLargeur = Math.floor(t.l / d);
            if(nbLargeur === 0) return;

            let rollsParBloc;

            if(t.L == 13.6){
                rollsParBloc = (nbLargeur * (nbLargeur + 1)) / 2;
            } else {
                rollsParBloc = (nbLargeur == 2) ? 5 :
                               (nbLargeur >= 3 ? 8 : nbLargeur);
            }

            let nbBlocs = Math.floor(longueurRestante / lr);
            let total = nbBlocs * rollsParBloc;

            totalGlobal += total;
            longueurRestante -= nbBlocs * lr;

        });

        html += `<p>${t.nom} → ${totalGlobal} rolls</p>`;

        if(totalGlobal > max){
            max = totalGlobal;
            meilleur = t.nom;
        }

    });

    html += `<h3>⭐ Meilleur choix : ${meilleur}</h3>`;

    document.getElementById("comparatif").innerHTML = html;
}

// démarrage
addRef();

</script>

</body>
</html>
