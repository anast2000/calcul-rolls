<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Calcul Rolls</title>
</head>

<body>

    <h1>Calcul des Dimensions</h1>

    <!-- Référence -->
    <label>Référence :</label><br>
    <input type="text" id="reference"><br><br>

    <!-- Largeur -->
    <label>Largeur (cm) :</label><br>
    <input type="number" id="largeur"><br><br>

    <!-- Longueur -->
    <label>Longueur (cm) :</label><br>
    <input type="number" id="longueur"><br><br>

    <!-- Bouton -->
    <button onclick="calculer()">Calculer</button>

    <h2>Résultat :</h2>
    <p id="resultat"></p>

    <script>
        function calculer() {
            let ref = document.getElementById("reference").value;
            let largeur = parseFloat(document.getElementById("largeur").value);
            let longueur = parseFloat(document.getElementById("longueur").value);

            // Calcul surface en cm²
            let surface = largeur * longueur;

            document.getElementById("resultat").innerHTML =
                "Référence : " + ref + "<br>" +
                "Largeur : " + largeur + " cm<br>" +
                "Longueur : " + longueur + " cm<br>" +
                "Surface : " + surface + " cm²";
        }
    </script>

</body>
</html>
